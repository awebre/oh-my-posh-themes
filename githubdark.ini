; GitHub Dark theme for fast-syntax-highlighting
; Matches the githubdark.omp.json Oh My Posh theme

[base]
default          = none
unknown-token    = #e82a2f,bold
commandseparator = #79c0ff
redirection      = #9ec3f0
here-string-tri  = #acf7b6
here-string-text = #acf7b6
here-string-var  = #cb9eff
exec-descriptor  = #9ec3f0,bold
comment          = #9ea7b3
correct-subtle   = #71b7ff
incorrect-subtle = #e82a2f
subtle-separator = #9ea7b3
subtle-bg        = bg:#1a1a1a
secondary        = #9ea7b3

[command-point]
reserved-word      = #f0b72f
subcommand         = #79c0ff
alias              = #79c0ff
suffix-alias       = #79c0ff
global-alias       = #79c0ff
builtin            = #79c0ff
function           = #79c0ff
command            = #79c0ff
precommand         = #79c0ff,underline
hashed-command     = #79c0ff
single-sq-bracket  = #79c0ff
double-sq-bracket  = #79c0ff
double-paren       = #f0b72f

[paths]
path          = #fbe59e
pathseparator = #f0b72f
path-to-dir   = #fbe59e,underline
globbing      = #F1502F,bold
globbing-ext  = #F1502F

[brackets]
paired-bracket  = bg:#1a1a1a
bracket-level-1 = #79c0ff,bold
bracket-level-2 = #f0b72f,bold
bracket-level-3 = #cb9eff,bold

[arguments]
single-hyphen-option   = #71b7ff
double-hyphen-option   = #71b7ff
back-quoted-argument   = #cb9eff
single-quoted-argument = #acf7b6
double-quoted-argument = #acf7b6
dollar-quoted-argument = #acf7b6

[in-string]
back-dollar-quoted-argument           = #cb9eff
back-or-dollar-double-quoted-argument = #cb9eff

[other]
variable             = #cb9eff
assign               = #9ec3f0
assign-array-bracket = #79c0ff
history-expansion    = #cb9eff,bold

[math]
mathvar = #cb9eff
mathnum = #71b7ff
matherr = #e82a2f

[for-loop]
forvar  = #cb9eff
fornum  = #71b7ff
foroper = #f0b72f
forsep  = #f0b72f,bold

[case]
case-input       = #79c0ff
case-parentheses = #f0b72f
case-condition   = bg:#1a1a1a
